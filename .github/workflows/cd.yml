name: Deploy to AWS EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aws-ec2-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
      AWS_EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
      AWS_EC2_SSH_PORT: ${{ secrets.AWS_EC2_SSH_PORT || '22' }}
      CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'bidmart-wallet' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew bootJar -x test --no-dependency-verification

      - name: Validate deployment secrets
        shell: bash
        run: |
          test -n "$AWS_EC2_HOST" || { echo "Missing AWS_EC2_HOST secret"; exit 1; }
          test -n "$AWS_EC2_USER" || { echo "Missing AWS_EC2_USER secret"; exit 1; }
          test -n "$AWS_EC2_SSH_KEY" || { echo "Missing AWS_EC2_SSH_KEY secret"; exit 1; }

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AWS_EC2_SSH_KEY" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -p "$AWS_EC2_SSH_PORT" -H "$AWS_EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload JAR to EC2
        shell: bash
        run: |
          JAR=$(ls build/libs/*SNAPSHOT.jar | grep -v plain | head -1)
          scp -P "$AWS_EC2_SSH_PORT" -i ~/.ssh/deploy.pem "$JAR" \
            "$AWS_EC2_USER@$AWS_EC2_HOST:/tmp/wallet-new.jar"

      - name: Deploy on EC2
        shell: bash
        run: |
          ssh -p "$AWS_EC2_SSH_PORT" -i ~/.ssh/deploy.pem \
            "$AWS_EC2_USER@$AWS_EC2_HOST" "
            set -euo pipefail
            docker cp /tmp/wallet-new.jar $CONTAINER_NAME:/app/app.jar
            docker restart $CONTAINER_NAME
            rm -f /tmp/wallet-new.jar
            echo 'Waiting for service...'
            for i in \$(seq 1 30); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1 || \
                 curl -sf http://localhost:8080/api/wallet/health > /dev/null 2>&1; then
                echo 'Service healthy'; exit 0
              fi
              sleep 3
            done
            echo 'Health check skipped (no actuator), deploy done'
          "
